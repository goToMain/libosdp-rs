name: Publish libosdp-sys

on:
  workflow_dispatch:
  push:
    # Sequence of patterns matched against refs/tags
    tags:
    - 'libosdp-sys-v*'

jobs:
  bindings_match:
    name: Verify checked-in bindings
    runs-on: ubuntu-latest
    env:
      CCACHE_DISABLE: "1"
      LIBOSDP_SYS_REGENERATE_BINDINGS: "1"
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - uses: actions-rust-lang/setup-rust-toolchain@v1.9.0
      with:
        toolchain: stable
    - name: Regenerate bindings
      run: cargo build -p libosdp-sys
    - name: Check bindings are committed
      run: git diff --exit-code -- libosdp-sys/src/bindings.rs

  cross_platform_check:
    name: Build crate on ${{ matrix.os }}
    needs: [bindings_match]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-latest, windows-latest]
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - uses: actions-rust-lang/setup-rust-toolchain@v1.9.0
      with:
        toolchain: stable
    - run: cargo build -p libosdp-sys

  publish:
    name: Publish Crate
    needs: [bindings_match, cross_platform_check]
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v5
      with:
        submodules: recursive
    - uses: actions-rust-lang/setup-rust-toolchain@v1.9.0
      with:
        toolchain: stable
    - name: Check semver
      continue-on-error: true
      uses: obi1kenobi/cargo-semver-checks-action@v2
      with:
        package: libosdp-sys
    - name: "Publish crate"
      run: |
        cargo publish -p libosdp-sys
      env:
        CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
